    <!-- Datos estructurados -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Hodex",
        "url": "https://www.hodex.es/",
        "logo": "https://www.hodex.es/Honma_Interior_logo.svg",
        "description": "Estudio full-cycle de IA, automatización y producto digital. Automatización de procesos con inteligencia artificial y desarrollo de productos web a medida.",
        "email": "team@hodex.es",
        "knowsAbout": [
          "Inteligencia artificial",
          "Automatización de procesos",
          "Desarrollo web a medida",
          "Producto digital"
        ]
      }
    </script>

    <!-- FAQ estructurada — mantener en sincronía con src/components/Faq.tsx -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "¿Qué tipo de procesos se pueden automatizar con IA?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Cualquier tarea repetitiva y de alto volumen: atención al cliente, clasificación y gestión documental, generación de informes, entrada de datos en el CRM, seguimiento de leads, facturación… En la discovery call identificamos cuáles tienen mayor retorno en tu caso concreto."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cuánto cuesta un proyecto de automatización?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Depende del alcance. La primera llamada es gratuita y sin compromiso: mapeamos el proceso y te damos un presupuesto cerrado antes de empezar — sin sorpresas ni costes ocultos durante el proyecto."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cuánto tiempo tarda en estar funcionando?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Una automatización acotada suele estar en producción en 2–6 semanas. Un producto web a medida, entre 1 y 3 meses según el alcance. Trabajamos por fases: ves resultados funcionando desde las primeras semanas, no al final."
            }
          },
          {
            "@type": "Question",
            "name": "¿Necesito conocimientos técnicos para trabajar con Hodex?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Nos integramos con las herramientas que ya usas y nos encargamos de toda la parte técnica. Al entregar, formamos a tu equipo para que use el sistema con autonomía en el día a día."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué pasa después de la entrega?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "El proyecto no termina en la entrega: ofrecemos mantenimiento, iteración y escalado continuo. El sistema evoluciona con tu negocio y el mismo equipo que lo construyó es el que lo mantiene."
            }
          },
          {
            "@type": "Question",
            "name": "¿Trabajáis en remoto o solo en una zona concreta?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Trabajamos en remoto con clientes de toda España. Las sesiones de discovery, seguimiento y formación se hacen por videollamada, con la misma cercanía que una reunión presencial."
            }
          }
        ]
      }
    </script>
